<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Suministro integral y soluciones profesionales para empresas, centros educativos y administración pública desde 1961."
    />
    <title>Lucas Rojas</title>
    <!-- Favicon dinámico según el tema del sistema -->
    <link rel="icon" href="/imagenes/logoRecortado.png" type="image/png" />
    <link rel="icon" href="/imagenes/logoRecortadoOscuro.png" media="(prefers-color-scheme: dark)" type="image/png" />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/imagenes/logoOscuroConFrase.png" />
    
    <!-- Fonts preconnect and load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      #page-loader {
          position: fixed; inset: 0; background: #06090d; z-index: 999999;
          display: flex; align-items: center; justify-content: center;
          flex-direction: column; gap: 24px; transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #page-loader.loaded { opacity: 0; visibility: hidden; }
      .loader-logo { width: 220px; height: auto; animation: loaderPulse 1.2s ease-in-out infinite; }
      @keyframes loaderPulse {
          0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,200,215,0.4)); }
          50% { transform: scale(1.1); filter: drop-shadow(0 0 24px rgba(0,200,215,0.9)); }
      }
      .loader-bar-track { width: 180px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
      .loader-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00c8d7, #00e8f8); border-radius: 2px; animation: loaderFill 0.5s ease-out forwards; }
      @keyframes loaderFill { 0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; } }
      #page-transition { position: fixed; inset: 0; z-index: 99999; pointer-events: none; display: flex; align-items: center; justify-content: center; }
      .pt-svg { position: absolute; inset: 0; width: 100%; height: 100%; will-change: contents; }
      body { background-color: #06090d; margin: 0; }
    </style>
  </head>
  <body>
    <!-- LOADER INICIAL -->
    <div id="page-loader">
        <img src="/imagenes/logoOscuroConFrase.png" alt="Lucas Rojas" class="loader-logo" data-logo-light="/imagenes/logoConFrase.png" data-logo-dark="/imagenes/logoOscuroConFrase.png" />
        <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
    </div>
    
    <!-- OVERLAY TRANSICIÓN DE PÁGINA -->
    <div id="page-transition">
        <svg class="pt-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
                <linearGradient id="ptGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%"   stop-color="var(--pt-color-1, #06090d)" />
                    <stop offset="20%"  stop-color="var(--pt-color-2, #06090d)" />
                    <stop offset="45%"  stop-color="var(--pt-color-3, #003d44)" />
                    <stop offset="70%"  stop-color="var(--pt-color-4, #008fa0)" />
                    <stop offset="100%" stop-color="var(--pt-color-5, #00c8d7)" />
                </linearGradient>
            </defs>
            <path id="pt-path-1" fill="url(#ptGrad1)" d="M 0 0 V 100 H 100 V 0 H 0" />
        </svg>
    </div>

    <!-- CURSOR PERSONALIZADO -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- BARRA DE PROGRESO SCROLL -->
    <div id="scroll-progress"></div>

    <!-- CANVAS PARTÍCULAS -->
    <canvas id="particles-canvas"></canvas>

    <!-- AURORA BACKGROUND -->
    <div class="aurora-bg">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <!-- GRID DE FONDO -->
    <div class="bg-grid"></div>

    <div id="app"></div>
    <script src="https://unpkg.com/lenis@1.3.4/dist/lenis.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
